<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IT Support Ticket</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <div class="brand" aria-label="Memories Events Management">
          <img class="brand-mark" src="./logo4.png" alt="" aria-hidden="true" />
          <div class="brand-text">
            <strong>memories</strong>
            <span>events management</span>
          </div>
        </div>

        <h1>IT Support Request</h1>
        <p class="muted">
          Submit a ticket and you will receive support as soon as possible.
        </p>
        <p id="domain-note" class="note">Loading allowed email domain...</p>

        <form id="ticket-form">
          <label>
            Full name
            <input type="text" name="name" required />
          </label>

          <label>
            Work email
            <input type="email" name="email" id="email-input" required />
          </label>

          <label>
            Department
            <input type="text" name="department" required />
          </label>

          <label>
            Issue type
            <select name="issueType" required>
              <option value="">Select an option</option>
              <option value="access">Account access</option>
              <option value="hardware">Hardware issue</option>
              <option value="software">Software issue</option>
              <option value="network">Network issue</option>
              <option value="other">Other</option>
            </select>
          </label>

          <label>
            Priority
            <select name="priority" required>
              <option value="">Select priority</option>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="critical">Critical</option>
            </select>
          </label>

          <label>
            Device (optional)
            <input type="text" name="device" placeholder="Laptop, phone, printer..." />
          </label>

          <label>
            Location (optional)
            <input type="text" name="location" placeholder="Floor, office, remote..." />
          </label>

          <label>
            Description
            <textarea
              name="description"
              rows="5"
              required
              placeholder="Describe the issue, what you expected, and what happened."
            ></textarea>
          </label>

          <button type="submit">Submit ticket</button>
          <p id="form-message" class="message" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
